<!DOCTYPE html>
<html lang="es-PE">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Seasons - Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="d-flex flex-column min-vh-100 aqa-bg-body">
  <header>
    <nav class="navbar navbar-expand-lg navbar-light">
      <div class="container-fluid d-flex flex-column align-items-center">
        <a class="navbar-brand m-0" href="index.html">
          <img src="img/fourseasonsbrowntransparent.png" height="120" alt="Four Seasons" class="mx-auto">
        </a>
        <button class="navbar-toggler mb-3" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
          aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
          <div class="d-flex flex-column flex-lg-row align-items-center justify-content-center w-100">
            <form method="get"
              class="d-flex align-items-center position-relative shadow-sm rounded-pill my-3 my-lg-0 mx-lg-4 aqa-principal-search min-w-300">
              <label hidden for="buscador">Buscador</label>
              <input type="search" class="form-control bg-transparent rounded-pill px-4 py-3 text-center w-100"
                id="buscador" placeholder="Ingrese aquí su busqueda">
              <button class="btn position-absolute end-0 top-0" type="submit">
                <img class="aqa-search-btn-img p-2 end-0 top-0 rounded-5 position-absolute" src="img/search-circle.svg" alt="search">
              </button>
            </form>
            <ul class="navbar-nav align-items-center">
              <li class="nav-item mx-2 mb-2 mb-lg-0">
                <a class="btn aqa-color-cont rounded-pill px-4 py-3" href="productos.html">Productos</a>
              </li>
              <li class="nav-item mx-2 mb-2 mb-lg-0">
                <a class="btn aqa-color-cont rounded-pill px-4 py-3" href="servicios.html">Servicios</a>
              </li>
              <li class="nav-item mx-2 mb-2 mb-lg-0">
                <a class="btn aqa-color-cont rounded-pill px-4 py-3" href="contacto.html">Contacto</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
  </header>
  <main class="aqa-border-brown rounded-5 d-flex justify-content-center my-4 mx-lg-5">
    <form method="get" autocomplete="off" class="container rounded-4 p-5 my-4 shadow aqa-form text-center">
      <h2 class="text-uppercase text-brand mb-4 fw-bold">Contáctanos</h2>
      <div class="mb-4 position-relative">
        <input id="nombre" type="text"
          class="form-control border-brand rounded-pill aqa-form-input position-relative bg-transparent flex-grow-1" placeholder="Nombre">
        <label for="nombre">
          <i>
            <img src="img/account.png" alt="Nombre" class="aqa-input-icon position-absolute">
          </i>
        </label>
      </div>
      <div class="mb-4 position-relative">
        <input id="telefono" type="tel" name="phone"
          class="form-control border-brand rounded-pill aqa-form-input position-relative bg-transparent flex-grow-1"
          placeholder="Teléfono">
        <label for="telefono">
          <i>
            <img src="img/phone_call.png" alt="telefono" class="aqa-input-icon position-absolute">
          </i>
        </label>
      </div>
      <div class="mb-4 position-relative">
        <input id="correo" type="email" name="email"
          class="form-control border-brand rounded-pill aqa-form-input position-relative bg-transparent flex-grow-1" placeholder="Correo">
        <label for="correo">
          <img src="img/email.png" alt="Correo" class="aqa-input-icon position-absolute">
        </label>
      </div>
      <div class="mb-4 position-relative">
        <label hidden>Comentario</label>
        <textarea name="message" class="form-control border-brand bg-transparent flex-grow-1 rounded-4 aqa-form-texta p-2"
          placeholder="Escribe aquí tu consulta..."></textarea>
      </div>
      <div class="mb-4 d-flex">
        <input id="terminos_y_condiciones" type="checkbox" class="me-2" data-required="1" name="terminos">
        <p class="m-0">Aceptar los
          <a href="terminos_y_condiciones.html" target="_blank" class="aqa-textcolor">Términos y condiciones</a>
        </p>
      </div>
      <div>
        <input type="submit" name="send" value="Enviar" class="btn aqa-color-cont rounded-pill px-5 py-3">
      </div>
    </form>
  </main>
  <footer class="text-center text-light mt-auto py-4 aqa-footer position-relative text-center">
    <div class="container">
      <br>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <table class="footer-table table-borderless">
            <tbody>
              <tr>
                <th>Contáctanos</th>
                <th>Nuestros Servicios</th>
              </tr>
              <tr>
                <td>Celular: 941635656 </td>
                <td>Mantenimiento</td>
              </tr>
              <tr>
                <td>Correo: <address class="d-inline">strings_foryou@fourseasons.com.pe</address>
                </td>
                <td>Accesorios</td>
              </tr>
              <tr>
                <td>Dirección: Av. Capriccio N° 24 Bach 12, Chorrillos</td>
                <td>Convenios</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <br>
      <small>Copyright © 2026</small>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
