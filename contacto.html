<!DOCTYPE html>
<html lang="es-PE">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Four Seasons - Contacto</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body class="d-flex flex-column min-vh-100 aqa-bg-body">
        <header>
            <nav class="navbar navbar-expand-lg py-0">
                <div class="container-fluid justify-content-center align-items-center px-0">
                    <a class="navbar-brand m-0" href="index.html">
                        <img src="img/fourseasonsbrowntransparent.png" height="130" alt="Four Seasons" class="mx-3">
                    </a>
                    <form method="get" class="d-flex align-items-center position-relative shadow-sm rounded-pill mx-3 aqa-principal-search" >
                        <label hidden for="buscador">Buscador</label>
                        <input type="search" class="form-control bg-transparent rounded-pill px-4 py-3 text-center flex-grow-1" id="buscador" placeholder="Ingrese aquí su busqueda">
                        <button class="btn position-absolute end-0 top-0" type="submit">
                            <img class="aqa-search-btn-img" src="img/search-circle.svg" alt="search">
                        </button>
                    </form>              
                    <ul class="navbar-nav flex-row align-items-center">
                        <li class="nav-item mx-2">
                            <a class="btn aqa-btn-fourseasons rounded-pill px-4 py-3" href="productos.html">Productos</a>
                        </li>
                        <li class="nav-item mx-2">
                            <a class="btn aqa-btn-fourseasons rounded-pill px-4 py-3" href="servicios.html">Servicios</a>
                        </li>
                        <li class="nav-item mx-2">
                            <a class="btn aqa-btn-fourseasons rounded-pill px-4 py-3" href="contacto.html">Contacto</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>
        <main class="aqa-border-brown rounded-5 d-flex justify-content-center my-4 mx-lg-5">
            <form method="get" autocomplete="off" class="rounded-4 p-5 my-4 shadow aqa-form">
                <h2 class="text-uppercase text-brand mb-4 fw-bold">Contáctanos</h2>
                <div class="mb-4 position-relative">        
                    <input id="nombre" type="text" class="form-control border-brand rounded-pill aqa-form-input bg-transparent flex-grow-1" placeholder="Nombre">
                    <label for="nombre">
                        <i>
                            <img src="img/account.png" alt="Nombre" class="aqa-input-icon">
                        </i>
                    </label> 
                </div>
                <div class="mb-4 position-relative">
                    <input id="telefono" type="tel" name="phone" class="form-control border-brand rounded-pill aqa-form-input bg-transparent flex-grow-1" placeholder="Teléfono">
                    <label for="telefono">
                        <i>
                            <img src="img/phone_call.png" alt="telefono" class="aqa-input-icon">
                        </i>
                    </label>
                </div>
                <div class="mb-4 position-relative">                    
                    <input id="correo" type="email" name="email" class="form-control border-brand rounded-pill aqa-form-input bg-transparent flex-grow-1" placeholder="Correo">
                    <label for="correo">
                        <img src="img/email.png" alt="Correo" class="aqa-input-icon">
                    </label>
                </div>
                <div class="mb-4 position-relative">
                    <label hidden>Comentario</label>
                    <textarea name="message" class="form-control border-brand bg-transparent flex-grow-1 rounded-4 aqa-form-texta" placeholder="Escribe aquí tu consulta..."></textarea>
                </div>
                <div class="mb-4 d-flex">
                    <input id="terminos_y_condiciones" type="checkbox" class="me-2" data-required="1" name="terminos">
                    <p class="m-0">Aceptar los
                        <a href="terminos_y_condiciones.html" target="_blank" class="aqa-textcolor">Términos y condiciones</a>
                    </p>
                </div>
                <div>
                    <input type="submit" name="send" value="Enviar" class="btn aqa-btn-fourseasons rounded-pill px-5 py-3">
                </div>
            </form>
        </main>
        <footer class="text-center text-light mt-auto py-4 aqa-footer">
            <div class="container">
                <br>
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <table class="footer-table table-borderless">
                            <tbody>
                                <tr>
                                    <th>Contáctanos</th>
                                    <th>Nuestros Servicios</th>
                                </tr>
                                <tr>
                                    <td>Celular: 941635656 </td>
                                    <td>Mantenimiento</td>
                                </tr>
                                <tr>
                                    <td>Correo: <address class="d-inline">strings_foryou@fourseasons.com.pe</address></td>
                                    <td>Accesorios</td>
                                </tr>
                                <tr>
                                    <td>Dirección: Av. Capriccio N° 24 Bach 12, Chorrillos</td>
                                    <td>Convenios</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <br>
                <small>Copyright © 2026</small>
            </div>
        </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
