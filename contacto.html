<!DOCTYPE html>
<html lang="es-PE">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Seasons - Contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="d-flex flex-column aqa-bgc-body">
  <header>
    <nav class="navbar navbar-expand-lg navbar-light">
      <div class="container-fluid d-flex flex-column align-items-center">
        <a class="navbar-brand m-0" href="index.html">
          <img src="img/fourseasonsbrowntransparent.png" height="120" alt="Four Seasons" class="mx-auto">
        </a>
        <button class="navbar-toggler mb-3" type="button" data-bs-toggle="collapse" data-bs-target="#navbarcontent"
          aria-controls="navbarcontent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarcontent">
          <div class="d-flex flex-column flex-lg-row align-items-center justify-content-center w-100">
            <form method="get"
              class="d-flex align-items-center position-relative shadow-sm rounded-pill my-3 my-lg-0 mx-lg-4 aqa-search">
              <label hidden for="buscador">Buscador</label>

              <input type="search"
                class="form-control bg-transparent border-0 rounded-pill px-4 py-3 text-center w-100 custom-input"
                id="buscador" placeholder="¿Qué instrumento estás buscando hoy?">
              <button class="btn position-absolute end-0 top-0" type="submit">
                <img class="aqa-btn-srch aqa-bgc p-2 end-0 top-0 rounded-5 position-absolute"
                  src="img/search-circle.svg" alt="search">
              </button>
            </form>
            <ul class="navbar-nav align-items-center">
              <li class="nav-item mx-2 mb-2 mb-lg-0">
                <a class="btn aqa-pill rounded-pill px-4 py-3" href="productos.html">Productos</a>
              </li>
              <li class="nav-item mx-2 mb-2 mb-lg-0">
                <a class="btn aqa-pill rounded-pill px-4 py-3" href="servicios.html">Servicios</a>
              </li>
              <li class="nav-item mx-2 mb-2 mb-lg-0">
                <a class="btn aqa-pill rounded-pill px-4 py-3" href="contacto.html">Contacto</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
  </header>
  <main class="aqa-bgc rounded-5 d-flex justify-content-center my-2 mx-2 mx-lg-5">
    <form method="get" autocomplete="off" class="container rounded-4 p-4 p-md-5 my-4 shadow aqa-form text-center">
      <h1 class="text-uppercase aqa-b-color text-brand mb-4 fw-bold fs-3">Contáctanos</h1>
      <div class="mb-4 position-relative">
        <input id="nombre" type="text"
          class="form-control border-brand rounded-pill aqa-form-input mb-0 position-relative bg-transparent flex-grow-1"
          placeholder="Nombre">
        <label for="nombre">
          <i class="w-100 h-auto">
            <img src="img/account.svg" alt="Nombre" class="aqa-input-icon border-2 p-2 position-absolute rounded-5">
          </i>
        </label>
      </div>
      <div class="mb-4 position-relative">
        <input id="telefono" type="tel" name="phone"
          class="form-control border-brand rounded-pill aqa-form-input mb-0 position-relative bg-transparent flex-grow-1"
          placeholder="Teléfono">
        <label for="telefono">
          <i class="w-12">
            <img src="img/phone_call.png" alt="telefono" class="aqa-input-icon p-2 rounded-5 position-absolute">
          </i>
        </label>
      </div>
      <div class="mb-4 position-relative">
        <input id="correo" type="email" name="email"
          class="form-control border-brand rounded-pill aqa-form-input mb-0 position-relative bg-transparent flex-grow-1"
          placeholder="Correo">
        <label for="correo">
          <img src="img/email.png" alt="Correo" class="aqa-input-icon p-2 rounded-5 position-absolute">
        </label>
      </div>
      <div class="mb-4 position-relative">
        <label hidden>Comentario</label>
        <textarea name="message"
          class="form-control border-brand bg-transparent flex-grow-1 rounded-4 aqa-form-texta p-2"
          placeholder="Escribe aquí tu consulta..."></textarea>
      </div>
      <div class="mb-4 d-flex">
        <input id="terminos_y_condiciones" type="checkbox" class="me-2" name="terminos">
        <label for="terminos_y_condiciones" class="m-0 aqa-b-color">Aceptar los
          <a href="terminos_y_condiciones.html" target="_blank" class="aqa-b-color">Términos y condiciones</a>
        </label>
      </div>
      <div>
        <input type="submit" name="send" value="Enviar" class="btn aqa-pill rounded-pill px-5 py-3">
      </div>
    </form>
  </main>
  <footer class="container-fluid aqa-bgc p-5 pb-0 m-0">
    <div class="row justify-content-center g-4">
      <div class="col-10 col-md-2 mb-3 text-center">
        <a href="index.html">
          <img class="img-fluid aqa-title-term" src="img/fourseasonsbrowntransparent.png" height="100"
            alt="Four Seasons">
        </a>
      </div>
      <div class="col-12 col-md-2 mb-3 text-center">
        <p class="fs-4 fw-bold">Explora:</p>
        <ul class="nav flex-column">
          <li class="nav-item mb-2"><a href="productos.html" class="text-reset text-decoration-none">Productos</a></li>
          <li class="nav-item mb-2"><a href="servicios.html" class="text-reset text-decoration-none">Servicios</a></li>
          <li class="nav-item mb-2"><a href="contacto.html" class="text-reset text-decoration-none">Contacto</a></li>
          <li class="nav-item mb-2"><a href="#" class="text-reset text-decoration-none">FAQs</a></li>
        </ul>
      </div>
      <div class="col-12 col-md-4 mb-3 text-center">
        <p class="fs-4 fw-bold">Contáctanos</p>
        <div class="d-inline-block text-start">
          <p class="mb-2"><i class="bi bi-phone me-2"></i> 941635656</p>
          <p class="mb-2"><i class="bi bi-envelope-at-fill me-2"></i> <span
              class="text-break">Strings_foryou@fourseasons.com.pe</span></p>
          <p class="mb-2"><i class="bi bi-geo-alt-fill me-2"></i> Av. Capriccio N° 24, Chorrillos</p>
        </div>
      </div>
      <div class="col-12 col-md-2 mb-3 text-center">
        <p class="fs-4 fw-bold">Nuestros Servicios:</p>
        <ul class="nav flex-column">
          <li class="nav-item mb-2">Mantenimiento</li>
          <li class="nav-item mb-2">Accesorios</li>
          <li class="nav-item mb-2">Convenios</li>
        </ul>
      </div>
      <div class="col-12 col-md-2 mb-3 text-center">
        <p class="fs-4 fw-bold">Redes</p>
        <div class="d-flex justify-content-center gap-3 fs-3">
          <a href="#" class="aqa-col-1"><i class="bi bi-facebook"></i></a>
          <a href="#" class="aqa-col-1"><i class="bi bi-whatsapp"></i></a>
          <a href="#" class="aqa-col-1"><i class="bi bi-youtube"></i></a>
        </div>
      </div>
    </div>
    <div class="text-center">
      <br>
      <small>Copyright © 2026</small>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
